<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Painel de Tênis de Mesa</title>
    <script>
        (function() {
            var theme = localStorage.getItem('theme-preference');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-modern fixed-top d-none d-md-block">
        <div class="container">
            <a class="navbar-brand" href="/">
                <svg class="brand-mark" width="22" height="22" viewBox="0 0 20 22" fill="none" aria-hidden="true">
                    <circle cx="8" cy="8" r="7" fill="var(--color-primary)"/>
                    <path d="M8 1a7 7 0 0 1 0 14V1z" fill="currentColor"/>
                    <rect x="12" y="12.5" width="3" height="8.5" rx="1.5" transform="rotate(38 12 12.5)" fill="currentColor"/>
                </svg>
                Tênis de Mesa
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentUri, '/campeonatos')} ? 'active' : ''" th:href="@{/campeonatos}"><i class="bi bi-trophy"></i> Campeonatos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#strings.startsWith(currentUri, '/treinos')} ? 'active' : ''" th:href="@{/treinos}"><i class="bi bi-clock"></i> Treino</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUri == '/' or #strings.startsWith(currentUri, '/geral')} ? 'active' : ''" th:href="@{/geral}"><i class="bi bi-bar-chart"></i> Geral</a>
                    </li>
                    <li class="nav-item ms-2">
                        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
                            <i class="bi bi-sun"></i><i class="bi bi-moon-stars"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="container page-container">
            <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show mt-3">
                <span th:text="${mensagem}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show mt-3">
                <span th:text="${erro}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <section layout:fragment="content">
            </section>
        </div>
    </div>

    <footer class="footer-custom text-center d-none d-md-block">
        Tênis de mesa - Ana Clara
    </footer>

    <nav class="bottom-nav d-md-none">
        <div class="bottom-nav-group">
            <a th:classappend="${#strings.startsWith(currentUri, '/campeonatos')} ? 'active' : ''" th:href="@{/campeonatos}" class="nav-item-mobile">
                <i class="bi bi-trophy"></i>
                <span>Campeonatos</span>
            </a>
            <a th:classappend="${#strings.startsWith(currentUri, '/treinos')} ? 'active' : ''" th:href="@{/treinos}" class="nav-item-mobile">
                <i class="bi bi-clock"></i>
                <span>Treino</span>
            </a>
            <a th:classappend="${currentUri == '/' or #strings.startsWith(currentUri, '/geral')} ? 'active' : ''" th:href="@{/geral}" class="nav-item-mobile">
                <i class="bi bi-bar-chart"></i>
                <span>Geral</span>
            </a>
        </div>
    </nav>

    <button id="theme-toggle-mobile" class="theme-toggle theme-toggle-mobile-float d-md-none" aria-label="Alternar tema">
        <i class="bi bi-sun"></i><i class="bi bi-moon-stars"></i>
    </button>



    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
