<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Treinos - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
        <h2><i class="bi bi-clock"></i> Treinos</h2>
        <a href="/treinos/novo" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Novo Treino</a>
    </div>

    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card border-primary h-100">
                <div class="card-body text-center">
                    <h5 class="card-title text-primary"><i class="bi bi-calendar-day"></i> Hoje</h5>
                    <p class="display-6" th:text="${#strings.isEmpty(resumoHoje.total) ? '0' : #numbers.formatDecimal(resumoHoje.total, 1, 1)}">0</p>
                    <small class="text-muted">
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoHoje.breakdown != null and resumoHoje.breakdown.containsKey(tipo) ? #numbers.formatDecimal(resumoHoje.breakdown.get(tipo), 1, 1) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border-success h-100">
                <div class="card-body text-center">
                    <h5 class="card-title text-success"><i class="bi bi-calendar-week"></i> Esta Semana</h5>
                    <p class="display-6" th:text="${#strings.isEmpty(resumoSemana.total) ? '0' : #numbers.formatDecimal(resumoSemana.total, 1, 1)}">0</p>
                    <small class="text-muted">
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoSemana.breakdown != null and resumoSemana.breakdown.containsKey(tipo) ? #numbers.formatDecimal(resumoSemana.breakdown.get(tipo), 1, 1) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card border-warning h-100">
                <div class="card-body text-center">
                    <h5 class="card-title text-warning"><i class="bi bi-calendar-month"></i> Este Mês</h5>
                    <p class="display-6" th:text="${#strings.isEmpty(resumoMes.total) ? '0' : #numbers.formatDecimal(resumoMes.total, 1, 1)}">0</p>
                    <small class="text-muted">
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoMes.breakdown != null and resumoMes.breakdown.containsKey(tipo) ? #numbers.formatDecimal(resumoMes.breakdown.get(tipo), 1, 1) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
    </div>

    <h3>Histórico</h3>
    <div th:if="${#lists.isEmpty(treinos)}" class="alert alert-info">Nenhum treino registrado.</div>
    <div th:unless="${#lists.isEmpty(treinos)}" class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Data</th>
                    <th>Duração (h)</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${treinos}">
                    <td th:text="${#temporals.format(t.data, 'dd/MM/yyyy')}"></td>
                    <td th:text="${#numbers.formatDecimal(t.duracaoHoras, 1, 1)}"></td>
                    <td><span class="badge bg-secondary" th:text="${t.tipo.name()}"></span></td>
                    <td>
                        <form th:action="@{/treinos/{id}/excluir(id=${t.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Excluir este treino?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
