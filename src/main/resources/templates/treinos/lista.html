<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Treinos - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
        <h2><i class="bi bi-clock"></i> Treinos</h2>
        <a href="/treinos/novo" class="btn btn-primary d-none d-md-inline-block"><i class="bi bi-plus-circle"></i> Novo Treino</a>
    </div>

    <div class="row mb-4">
        <div class="col-12 col-md-4 mb-3">
            <div class="card card-gradient-success text-center h-100">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-calendar-day"></i> Hoje</h5>
                    <p class="stat-value" th:text="${#strings.isEmpty(resumoHoje.total) ? '0,0' : #numbers.formatDecimal(resumoHoje.total, 1, 1)}"></p>
                    <small>
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoHoje.breakdown != null and resumoHoje.breakdown.containsKey(tipo) ? #numbers.formatDecimal(resumoHoje.breakdown.get(tipo), 1, 1) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4 mb-3">
            <div class="card card-gradient-info text-center h-100">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-calendar-week"></i> Esta Semana</h5>
                    <p class="stat-value" th:text="${#strings.isEmpty(resumoSemana.total) ? '0,0' : #numbers.formatDecimal(resumoSemana.total, 1, 1)}"></p>
                    <small>
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoSemana.breakdown != null and resumoSemana.breakdown.containsKey(tipo) ? #numbers.formatDecimal(resumoSemana.breakdown.get(tipo), 1, 1) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4 mb-3">
            <div class="card card-gradient-warning text-center h-100">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-calendar-month"></i> Este Mês</h5>
                    <p class="stat-value" th:text="${#strings.isEmpty(resumoMes.total) ? '0,0' : #numbers.formatDecimal(resumoMes.total, 1, 1)}"></p>
                    <small>
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoMes.breakdown != null and resumoMes.breakdown.containsKey(tipo) ? #numbers.formatDecimal(resumoMes.breakdown.get(tipo), 1, 1) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
    </div>

    <h3>Histórico</h3>
    <div th:if="${#lists.isEmpty(treinos)}" class="alert alert-info text-center py-4">
        <i class="bi bi-clock display-4 d-block mb-2"></i>
        Nenhum treino registrado.
    </div>
    <div th:unless="${#lists.isEmpty(treinos)}" class="row">
        <div th:each="t : ${treinos}" class="col-12 col-md-4 col-lg-3 mb-3">
            <div class="card card-elevated h-100">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="fw-semibold" th:text="${#temporals.format(t.data, 'dd/MM/yyyy')}"></span>
                        <span class="badge-tipo-treino badge"
                              th:classappend="${t.tipo.name() == 'TECNICA' ? 'bg-info' : 
                                               t.tipo.name() == 'FISICO' ? 'bg-success' : 
                                               'bg-warning text-dark'}">
                            <i th:classappend="${t.tipo.name() == 'TECNICA' ? 'bi bi-gear' : 
                                                t.tipo.name() == 'FISICO' ? 'bi bi-heart-pulse' : 
                                                'bi bi-controller'}"></i>
                            <span th:text="${t.tipo.name()}"></span>
                        </span>
                    </div>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="stat-value" style="font-size: 1.5rem;" th:text="${#numbers.formatDecimal(t.duracaoHoras, 1, 1)}"></span>
                        <span class="text-muted small">horas</span>
                    </div>
                    <hr class="my-2">
                    <form th:action="@{/treinos/{id}/excluir(id=${t.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Excluir este treino?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger btn-action w-100"><i class="bi bi-trash"></i> Excluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <a href="/treinos/novo" class="fab d-md-none">
        <i class="bi bi-plus-lg"></i>
    </a>
</section>
</body>
</html>
