<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Treinos - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="page-header d-flex justify-content-between align-items-center mt-3 mt-md-4 mb-3">
        <h2><i class="bi bi-clock"></i> Treinos</h2>
        <a th:href="@{/treinos/novo}" class="btn btn-primary d-none d-md-inline-block"><i class="bi bi-plus-circle"></i> Novo Treino</a>
    </div>

    <div class="row mb-4 g-2 g-md-3">
        <div class="col-4">
            <div class="stat-tile stat-tile-success h-100">
                <div class="card-body py-2 py-md-4 px-1 px-md-3">
                    <div class="stat-label"><i class="bi bi-calendar-day"></i> Hoje</div>
                    <p class="stat-value small mb-0" th:text="${@treinoHelper.formatDuracao(resumoHoje.total)}"></p>
                    <small class="d-none d-md-block text-muted mt-1">
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoHoje.breakdown != null and resumoHoje.breakdown.containsKey(tipo) ? @treinoHelper.formatDuracao(resumoHoje.breakdown.get(tipo)) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-tile stat-tile-info h-100">
                <div class="card-body py-2 py-md-4 px-1 px-md-3">
                    <div class="stat-label"><i class="bi bi-calendar-week"></i> <span class="d-none d-md-inline">Esta Semana</span><span class="d-md-none">Semana</span></div>
                    <p class="stat-value small mb-0" th:text="${@treinoHelper.formatDuracao(resumoSemana.total)}"></p>
                    <small class="d-none d-md-block text-muted mt-1">
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoSemana.breakdown != null and resumoSemana.breakdown.containsKey(tipo) ? @treinoHelper.formatDuracao(resumoSemana.breakdown.get(tipo)) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-tile stat-tile-warning h-100">
                <div class="card-body py-2 py-md-4 px-1 px-md-3">
                    <div class="stat-label"><i class="bi bi-calendar-month"></i> <span class="d-none d-md-inline">Este Mês</span><span class="d-md-none">Mês</span></div>
                    <p class="stat-value small mb-0" th:text="${@treinoHelper.formatDuracao(resumoMes.total)}"></p>
                    <small class="d-none d-md-block text-muted mt-1">
                        <span th:each="tipo : ${tipos}">
                            <span th:text="${tipo.name() + ': ' + (resumoMes.breakdown != null and resumoMes.breakdown.containsKey(tipo) ? @treinoHelper.formatDuracao(resumoMes.breakdown.get(tipo)) : '0')}"></span>
                            <span th:unless="${tipo.ordinal() == tipos.length - 1}"> | </span>
                        </span>
                    </small>
                </div>
            </div>
        </div>
    </div>

    <h3>Histórico</h3>
    <div th:if="${#lists.isEmpty(treinos)}" class="empty-state">
        <i class="bi bi-clock"></i>
        <p>Nenhum treino registrado. Registre o primeiro para acompanhar a evolução.</p>
        <a th:href="@{/treinos/novo}" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> Novo treino</a>
    </div>
    <div th:unless="${#lists.isEmpty(treinos)}" class="row g-3">
        <div th:each="t : ${treinos}" class="col-12 col-md-4 col-lg-3">
            <div class="card card-elevated h-100">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="fw-semibold" th:text="${#temporals.format(t.data, 'dd/MM/yyyy')}"></span>
                        <span class="badge-tipo-treino badge"
                              th:classappend="${t.tipo.name() == 'TECNICA' ? 'bg-info' : 
                                               t.tipo.name() == 'FISICO' ? 'bg-success' : 
                                               'bg-warning text-dark'}">
                            <i th:classappend="${t.tipo.name() == 'TECNICA' ? 'bi bi-gear' : 
                                                t.tipo.name() == 'FISICO' ? 'bi bi-heart-pulse' : 
                                                'bi bi-controller'}"></i>
                            <span th:text="${t.tipo.name()}"></span>
                        </span>
                    </div>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="stat-value" style="font-size: 1.5rem;" th:text="${@treinoHelper.formatDuracao(t.duracaoHoras)}"></span>
                    </div>
                    <hr class="my-2">
                    <form th:action="@{/treinos/{id}/excluir(id=${t.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Excluir este treino?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger btn-action w-100"><i class="bi bi-trash"></i> Excluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <a th:href="@{/treinos/novo}" class="fab d-md-none">
        <i class="bi bi-plus-lg"></i>
    </a>
</section>
</body>
</html>
