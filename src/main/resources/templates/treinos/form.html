<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Treino - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="row mt-4">
        <div class="col-md-6 offset-md-3">
            <h2 class="mb-4"><i class="bi bi-clock"></i> Novo Treino</h2>
            <form th:action="@{/treinos}" th:object="${treino}" method="post" class="card card-elevated card-body">
                <div class="form-floating mb-3">
                    <input type="date" th:field="*{data}" class="form-control" placeholder="Data do treino" required>
                    <label>Data *</label>
                </div>
                <div class="mb-3">
                    <label class="form-label">Duração *</label>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="number" name="horas" class="form-control" min="0" max="23" placeholder="horas" required>
                        </div>
                        <div class="col-6">
                            <input type="number" name="minutos" class="form-control" min="0" max="59" step="5" placeholder="minutos" required>
                        </div>
                    </div>
                </div>
                <div class="form-floating mb-3">
                    <select th:field="*{tipo}" class="form-select" required>
                        <option value="">— Selecione —</option>
                        <option th:each="t : ${tipos}" th:value="${t.name()}" th:text="${t.name()}"></option>
                    </select>
                    <label>Tipo *</label>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/treinos" class="btn btn-outline-secondary btn-action">Cancelar</a>
                    <button type="submit" class="btn btn-primary btn-action">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
