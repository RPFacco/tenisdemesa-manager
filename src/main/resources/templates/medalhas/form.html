<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Medalha - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="row mt-4">
        <div class="col-md-6 offset-md-3">
            <h2 class="mb-4"><i class="bi bi-stars"></i> Nova Medalha</h2>
            <form th:action="@{/campeonatos/{cid}/medalhas(cid=${medalha.campeonato.id})}" th:object="${medalha}" method="post" class="card card-elevated card-body">
                <div class="form-floating mb-3">
                    <select th:field="*{tipo}" class="form-select" required>
                        <option value="">— Selecione —</option>
                        <option th:each="t : ${tipos}" th:value="${t.name()}" th:text="${t.name()}"></option>
                    </select>
                    <label>Tipo *</label>
                </div>
                <div class="form-floating mb-3">
                    <select th:field="*{modalidade}" class="form-select" required>
                        <option value="">— Selecione —</option>
                        <option th:each="m : ${modalidades}" th:value="${m.name()}" th:text="${m.name().replace('_', ' ')}"></option>
                    </select>
                    <label>Modalidade *</label>
                </div>
                <div class="d-flex justify-content-between">
                    <a th:href="@{/campeonatos/{id}(id=${medalha.campeonato.id})}" class="btn btn-outline-secondary btn-action">Cancelar</a>
                    <button type="submit" class="btn btn-primary btn-action">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
