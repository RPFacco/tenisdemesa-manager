<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Geral - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="row mt-4">
        <div class="col-12">
            <h2 class="mb-4"><i class="bi bi-bar-chart"></i> Estatísticas Gerais</h2>
        </div>
    </div>
    <div class="row">
        <div class="col-md-3 mb-3">
            <div class="card card-gradient-success text-center">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-trophy"></i> Vitórias</h5>
                    <p class="stat-value mb-0" th:text="${totalVitorias}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card card-gradient-danger text-center">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-x-circle"></i> Derrotas</h5>
                    <p class="stat-value mb-0" th:text="${totalDerrotas}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card card-gradient-info text-center">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-pie-chart"></i> Taxa de Vitória</h5>
                    <p class="stat-value mb-0" th:text="${taxaVitoria}">—</p>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card card-gradient-warning text-center">
                <div class="card-body py-4">
                    <h5 class="card-title"><i class="bi bi-fire"></i> Sequência</h5>
                    <p class="stat-value mb-0" th:text="${sequenciaAtual}">—</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-md-3 mb-3">
            <div class="card card-elevated border-primary border-2 text-center">
                <div class="card-body py-4">
                    <h5 class="card-title text-primary"><i class="bi bi-flag"></i> Campeonatos</h5>
                    <p class="stat-value mb-0" th:text="${totalCampeonatos}">0</p>
                </div>
            </div>
        </div>
        <div th:each="tipo : ${tiposMedalha}" class="col-md-3 mb-3">
            <div class="card card-elevated text-center">
                <div class="card-body py-4">
                    <h5 class="card-title mb-0">
                        <i class="medal-icon bi"
                           th:classappend="${tipo.name() == 'OURO' ? 'bi-star-fill text-warning' : 
                                                  tipo.name() == 'PRATA' ? 'bi-star-fill text-secondary' : 
                                                  'bi-star-fill'}"
                           th:style="${tipo.name() == 'BRONZE' ? 'color: #cd7f32' : ''}"></i>
                    </h5>
                    <p class="stat-value mb-0" th:text="${medalhasPorTipo.getOrDefault(tipo, 0L)}">0</p>
                    <span class="text-muted small" th:text="${tipo.name()}"></span>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
