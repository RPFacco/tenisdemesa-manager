<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Campeonato - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="row mt-4">
        <div class="col-md-8 offset-md-2">
            <h2 class="mb-4">
                <i class="bi bi-trophy"></i>
                <span th:if="${campeonato.id != null}">Editar Campeonato</span>
                <span th:unless="${campeonato.id != null}">Novo Campeonato</span>
            </h2>
            <form th:action="${campeonato.id != null} ? @{/campeonatos/{id}(id=${campeonato.id})} : @{/campeonatos}"
                  th:object="${campeonato}" method="post" class="card card-elevated card-body">
                <div class="form-floating mb-3">
                    <input type="text" th:field="*{nome}" class="form-control" placeholder="Nome do campeonato" required>
                    <label>Nome *</label>
                    <div th:if="${#fields.hasErrors('nome')}" class="text-danger small mt-1" th:errors="*{nome}"></div>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" th:field="*{local}" class="form-control" placeholder="Local do campeonato" required>
                    <label>Local *</label>
                    <div th:if="${#fields.hasErrors('local')}" class="text-danger small mt-1" th:errors="*{local}"></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="date" th:field="*{dataInicio}" class="form-control" placeholder="Data início" required>
                            <label>Data Início *</label>
                            <div th:if="${#fields.hasErrors('dataInicio')}" class="text-danger small mt-1" th:errors="*{dataInicio}"></div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="date" th:field="*{dataFim}" class="form-control" placeholder="Data fim" required>
                            <label>Data Fim *</label>
                            <div th:if="${#fields.hasErrors('dataFim')}" class="text-danger small mt-1" th:errors="*{dataFim}"></div>
                        </div>
                    </div>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" th:field="*{categoria}" class="form-control" placeholder="Ex: Estadual, Regional...">
                    <label>Categoria</label>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/campeonatos" class="btn btn-outline-secondary btn-action">Cancelar</a>
                    <button type="submit" class="btn btn-primary btn-action">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
