<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${campeonato.nome} + ' - Painel de Tênis de Mesa'"></title></head>
<body>
<section layout:fragment="content">
    <div class="page-header d-flex flex-wrap justify-content-between align-items-start gap-2 mt-3 mt-md-4">
        <div>
            <h2 class="mb-1"><i class="bi bi-trophy"></i> <span th:text="${campeonato.nome}"></span></h2>
            <p class="text-muted mb-0">
                <i class="bi bi-geo-alt"></i> <span th:text="${campeonato.local}"></span>
                &middot; <span th:text="${#temporals.format(campeonato.dataInicio, 'dd/MM/yyyy')} + ' a ' + ${#temporals.format(campeonato.dataFim, 'dd/MM/yyyy')}"></span>
                <span th:if="${campeonato.categoria}" th:text="|&middot; ${campeonato.categoria}|"></span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/campeonatos/{id}/editar(id=${campeonato.id})}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-pencil"></i> Editar</a>
            <form th:action="@{/campeonatos/{id}/excluir(id=${campeonato.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Excluir este campeonato? Todas as partidas e medalhas serão removidas.');">
                <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i> Excluir</button>
            </form>
        </div>
    </div>

    <div class="row g-2 g-md-3 mt-1">
        <div class="col-4">
            <div class="stat-tile stat-tile-success">
                <div class="card-body py-3 py-md-4">
                    <div class="stat-label">Vitórias</div>
                    <span class="stat-value" th:text="${vitorias}">0</span>
                </div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-tile stat-tile-danger">
                <div class="card-body py-3 py-md-4">
                    <div class="stat-label">Derrotas</div>
                    <span class="stat-value" th:text="${derrotas}">0</span>
                </div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-tile stat-tile-info">
                <div class="card-body py-3 py-md-4">
                    <div class="stat-label">Taxa de Vitória</div>
                    <span class="stat-value small" th:text="${taxaVitoria}">—</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-elevated mt-4">
        <div class="card-header card-header-clean d-flex justify-content-between align-items-center">
            <h3 class="mb-0"><i class="bi bi-list-check"></i> Partidas</h3>
            <a th:href="@{/campeonatos/{id}/partidas/nova(id=${campeonato.id})}" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> Nova Partida</a>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(campeonato.partidas)}" class="alert alert-info text-center py-4 mb-0">
                <i class="bi bi-list-check display-4 d-block mb-2"></i>
                Nenhuma partida registrada.
            </div>
            <div th:unless="${#lists.isEmpty(campeonato.partidas)}" class="table-responsive d-none d-md-block">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Data</th>
                            <th>Adversário</th>
                            <th>Fase</th>
                            <th>Sets</th>
                            <th>Resultado</th>
                            <th>Vídeo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${campeonato.partidas}">
                            <td th:text="${#temporals.format(p.data, 'dd/MM/yyyy')}"></td>
                            <td class="fw-semibold" th:text="${p.adversario}"></td>
                            <td th:text="${p.fase != null ? p.fase.name().replace('_', ' ') : '—'}"></td>
                            <td>
                                <span th:each="set, iter : ${p.sets}" th:text="${set.pontosAtleta + '-' + set.pontosAdversario}" class="scorechip"></span>
                            </td>
                            <td>
                                <span th:if="${p.vitoria}" class="badge bg-success">Vitória</span>
                                <span th:if="${p.derrota}" class="badge bg-danger">Derrota</span>
                            </td>
                            <td>
                                <a th:if="${p.linkYoutube != null and !p.linkYoutube.isEmpty()}" th:href="${p.linkYoutube}" target="_blank" class="btn btn-sm btn-outline-danger btn-action"><i class="bi bi-youtube"></i></a>
                                <span th:unless="${p.linkYoutube != null and !p.linkYoutube.isEmpty()}" class="text-muted">—</span>
                            </td>
                            <td>
                                <a th:href="@{/campeonatos/{cid}/partidas/{pid}/editar(cid=${campeonato.id}, pid=${p.id})}" class="btn btn-sm btn-outline-secondary btn-action"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/campeonatos/{cid}/partidas/{pid}/excluir(cid=${campeonato.id}, pid=${p.id})}" method="post" style="display:inline"
                                      onsubmit="return confirm('Excluir esta partida?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger btn-action"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:unless="${#lists.isEmpty(campeonato.partidas)}" class="d-md-none">
                <div th:each="p : ${campeonato.partidas}" class="border-bottom p-3">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <div>
                            <span class="fw-semibold" th:text="${p.adversario}"></span>
                            <span class="text-muted small ms-2" th:text="${#temporals.format(p.data, 'dd/MM/yyyy')}"></span>
                        </div>
                        <span th:if="${p.vitoria}" class="badge bg-success">Vitória</span>
                        <span th:if="${p.derrota}" class="badge bg-danger">Derrota</span>
                    </div>
                    <div class="small text-muted mb-1 d-flex align-items-center flex-wrap gap-1">
                        <span th:text="${p.fase != null ? p.fase.name().replace('_', ' ') : '—'}"></span>
                        <span th:if="${not #lists.isEmpty(p.sets)}" class="d-flex align-items-center flex-wrap gap-1 ms-1">
                            <span th:each="set, iter : ${p.sets}" th:text="${set.pontosAtleta + '-' + set.pontosAdversario}" class="scorechip"></span>
                        </span>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <a th:if="${p.linkYoutube != null and !p.linkYoutube.isEmpty()}" th:href="${p.linkYoutube}" target="_blank" class="btn btn-sm btn-outline-danger" style="min-height:44px;display:flex;align-items:center;"><i class="bi bi-youtube"></i></a>
                        <a th:href="@{/campeonatos/{cid}/partidas/{pid}/editar(cid=${campeonato.id}, pid=${p.id})}" class="btn btn-sm btn-outline-secondary" style="min-height:44px;display:flex;align-items:center;"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/campeonatos/{cid}/partidas/{pid}/excluir(cid=${campeonato.id}, pid=${p.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Excluir esta partida?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger" style="min-height:44px;display:flex;align-items:center;"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-elevated mt-4">
        <div class="card-header card-header-clean d-flex justify-content-between align-items-center">
            <h3 class="mb-0"><i class="bi bi-stars"></i> Medalhas</h3>
            <a th:href="@{/campeonatos/{id}/medalhas/nova(id=${campeonato.id})}" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> Nova Medalha</a>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(campeonato.medalhas)}" class="alert alert-info text-center py-4 mb-0">
                <i class="bi bi-stars display-4 d-block mb-2"></i>
                Nenhuma medalha conquistada.
            </div>
            <div th:unless="${#lists.isEmpty(campeonato.medalhas)}" class="table-responsive d-none d-md-block">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tipo</th>
                            <th>Modalidade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${campeonato.medalhas}">
                            <td>
                                <th:block th:replace="~{medalhas/fragment :: medalha-badge(medalha=${m})}"></th:block>
                            </td>
                            <td th:text="${m.modalidade.name().replace('_', ' ')}"></td>
                            <td>
                                <form th:action="@{/campeonatos/{cid}/medalhas/{mid}/excluir(cid=${campeonato.id}, mid=${m.id})}" method="post" style="display:inline"
                                      onsubmit="return confirm('Excluir esta medalha?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger btn-action"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:unless="${#lists.isEmpty(campeonato.medalhas)}" class="d-md-none">
                <div th:each="m : ${campeonato.medalhas}" class="border-bottom p-3 d-flex justify-content-between align-items-center">
                    <div>
                        <th:block th:replace="~{medalhas/fragment :: medalha-badge(medalha=${m})}"></th:block>
                        <span class="text-muted ms-2" th:text="${m.modalidade.name().replace('_', ' ')}"></span>
                    </div>
                    <form th:action="@{/campeonatos/{cid}/medalhas/{mid}/excluir(cid=${campeonato.id}, mid=${m.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Excluir esta medalha?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger" style="min-height:44px;display:flex;align-items:center;"><i class="bi bi-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <a th:href="@{/campeonatos}" class="btn btn-outline-secondary mt-3"><i class="bi bi-arrow-left"></i> Voltar</a>
</section>
</body>
</html>
