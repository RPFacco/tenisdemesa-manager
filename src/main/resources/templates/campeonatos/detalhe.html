<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${campeonato.nome} + ' - Painel de Tênis de Mesa'"></title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4">
        <div>
            <h2><i class="bi bi-trophy"></i> <span th:text="${campeonato.nome}"></span></h2>
            <p class="text-muted">
                <i class="bi bi-geo-alt"></i> <span th:text="${campeonato.local}"></span>
                &middot; <span th:text="${#temporals.format(campeonato.dataInicio, 'dd/MM/yyyy')} + ' a ' + ${#temporals.format(campeonato.dataFim, 'dd/MM/yyyy')}"></span>
                <span th:if="${campeonato.categoria}" th:text="|&middot; ${campeonato.categoria}|"></span>
            </p>
        </div>
        <div>
            <a th:href="@{/campeonatos/{id}/editar(id=${campeonato.id})}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-pencil"></i> Editar</a>
            <form th:action="@{/campeonatos/{id}/excluir(id=${campeonato.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Excluir este campeonato? Todas as partidas e medalhas serão removidas.');">
                <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i> Excluir</button>
            </form>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-md-4 mb-3">
            <div class="card text-white bg-success text-center">
                <div class="card-body">
                    <h5>Vitórias</h5>
                    <span class="display-6" th:text="${vitorias}">0</span>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-white bg-danger text-center">
                <div class="card-body">
                    <h5>Derrotas</h5>
                    <span class="display-6" th:text="${derrotas}">0</span>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-white bg-info text-center">
                <div class="card-body">
                    <h5>Taxa de Vitória</h5>
                    <span class="display-6" th:text="${taxaVitoria}">—</span>
                </div>
            </div>
        </div>
    </div>

    <h3 class="mt-4"><i class="bi bi-list-check"></i> Partidas</h3>
    <a th:href="@{/campeonatos/{id}/partidas/nova(id=${campeonato.id})}" class="btn btn-primary btn-sm mb-3"><i class="bi bi-plus-circle"></i> Nova Partida</a>
    <div th:if="${#lists.isEmpty(campeonato.partidas)}" class="alert alert-info">Nenhuma partida registrada.</div>
    <div th:unless="${#lists.isEmpty(campeonato.partidas)}" class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Data</th>
                    <th>Adversário</th>
                    <th>Fase</th>
                    <th>Sets</th>
                    <th>Resultado</th>
                    <th>Vídeo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${campeonato.partidas}">
                    <td th:text="${#temporals.format(p.data, 'dd/MM/yyyy')}"></td>
                    <td th:text="${p.adversario}"></td>
                    <td th:text="${p.fase != null ? p.fase.name().replace('_', ' ') : '—'}"></td>
                    <td>
                        <span th:each="set, iter : ${p.sets}">
                            <span th:text="${set.pontosAtleta + '-' + set.pontosAdversario}"></span>
                            <span th:unless="${iter.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <span th:if="${p.resultado != null and p.resultado.name() == 'VITORIA'}" class="badge bg-success">VITÓRIA</span>
                        <span th:if="${p.resultado != null and p.resultado.name() == 'DERROTA'}" class="badge bg-danger">DERROTA</span>
                    </td>
                    <td>
                        <a th:if="${p.linkYoutube != null and !p.linkYoutube.isEmpty()}" th:href="${p.linkYoutube}" target="_blank" class="btn btn-sm btn-outline-danger"><i class="bi bi-youtube"></i></a>
                        <span th:unless="${p.linkYoutube != null and !p.linkYoutube.isEmpty()}" class="text-muted">—</span>
                    </td>
                    <td>
                        <a th:href="@{/campeonatos/{cid}/partidas/{pid}/editar(cid=${campeonato.id}, pid=${p.id})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/campeonatos/{cid}/partidas/{pid}/excluir(cid=${campeonato.id}, pid=${p.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Excluir esta partida?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 class="mt-4"><i class="bi bi-stars"></i> Medalhas</h3>
    <a th:href="@{/campeonatos/{id}/medalhas/nova(id=${campeonato.id})}" class="btn btn-primary btn-sm mb-3"><i class="bi bi-plus-circle"></i> Nova Medalha</a>
    <div th:if="${#lists.isEmpty(campeonato.medalhas)}" class="alert alert-info">Nenhuma medalha conquistada.</div>
    <div th:unless="${#lists.isEmpty(campeonato.medalhas)}" class="table-responsive">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Tipo</th>
                    <th>Modalidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${campeonato.medalhas}">
                    <td>
                        <i th:if="${m.tipo.name() == 'OURO'}" class="bi bi-star-fill text-warning"></i>
                        <i th:if="${m.tipo.name() == 'PRATA'}" class="bi bi-star-fill text-secondary"></i>
                        <i th:if="${m.tipo.name() == 'BRONZE'}" class="bi bi-star-fill" style="color: #cd7f32"></i>
                        <span th:text="${m.tipo.name()}"></span>
                    </td>
                    <td th:text="${m.modalidade.name().replace('_', ' ')}"></td>
                    <td>
                        <form th:action="@{/campeonatos/{cid}/medalhas/{mid}/excluir(cid=${campeonato.id}, mid=${m.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Excluir esta medalha?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="/campeonatos" class="btn btn-outline-secondary mt-3"><i class="bi bi-arrow-left"></i> Voltar</a>
</section>
</body>
</html>
