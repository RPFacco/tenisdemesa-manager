<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Campeonatos - Painel de Tênis de Mesa</title></head>
<body>
<section layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mt-4 mb-3 animate-on-scroll">
        <h2><i class="bi bi-trophy"></i> Campeonatos</h2>
        <a href="/campeonatos/novo" class="btn btn-primary d-none d-md-inline-block"><i class="bi bi-plus-circle"></i> Novo Campeonato</a>
    </div>
    <div th:if="${#lists.isEmpty(campeonatos)}" class="alert alert-info text-center py-4 animate-on-scroll">
        <i class="bi bi-trophy display-4 d-block mb-2"></i>
        Nenhum campeonato cadastrado ainda.
    </div>
    <div th:unless="${#lists.isEmpty(campeonatos)}" class="row stagger-children">
        <div th:each="c : ${campeonatos}" class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card card-elevated card-border-left h-100 card-3d">
                <div class="card-body">
                    <h5 class="card-title mb-1">
                        <a th:href="@{/campeonatos/{id}(id=${c.id})}" class="text-decoration-none stretched-link position-relative" th:text="${c.nome}"></a>
                    </h5>
                    <p class="text-muted small mb-2">
                        <i class="bi bi-geo-alt"></i> <span th:text="${c.local}"></span>
                        <br>
                        <i class="bi bi-calendar"></i> <span th:text="${#temporals.format(c.dataInicio, 'dd/MM/yyyy')} + ' a ' + ${#temporals.format(c.dataFim, 'dd/MM/yyyy')}"></span>
                        <span th:if="${c.categoria}" th:text="| — ${c.categoria}|"></span>
                    </p>
                    <div class="d-flex justify-content-between align-items-center mt-2 position-relative" style="z-index: 2;">
                        <span>
                            <span th:each="m : ${c.medalhas}" class="me-1">
                                <i th:if="${m.tipo.name() == 'OURO'}" class="bi bi-star-fill text-warning medal-icon"></i>
                                <i th:if="${m.tipo.name() == 'PRATA'}" class="bi bi-star-fill text-secondary medal-icon"></i>
                                <i th:if="${m.tipo.name() == 'BRONZE'}" class="bi bi-star-fill medal-icon" style="color: #cd7f32"></i>
                            </span>
                            <span th:if="${#lists.isEmpty(c.medalhas)}" class="text-muted small">Sem medalhas</span>
                        </span>
                        <span class="text-muted small">
                            <i class="bi bi-list-check"></i> <span th:text="${#lists.size(c.partidas)}"></span> partidas
                        </span>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-top-0 d-flex gap-2 justify-content-end position-relative" style="z-index: 2; border-top: none;">
                    <a th:href="@{/campeonatos/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary btn-action"><i class="bi bi-eye"></i></a>
                    <a th:href="@{/campeonatos/{id}/editar(id=${c.id})}" class="btn btn-sm btn-outline-secondary btn-action"><i class="bi bi-pencil"></i></a>
                    <form th:action="@{/campeonatos/{id}/excluir(id=${c.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Excluir este campeonato? Todas as partidas e medalhas serão removidas.');">
                        <button type="submit" class="btn btn-sm btn-outline-danger btn-action"><i class="bi bi-trash"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <a href="/campeonatos/novo" class="fab d-md-none">
        <i class="bi bi-plus-lg"></i>
    </a>
</section>
</body>
</html>
